<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Golden Flying Tiger - Admin</title><link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet"><style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}body{font-family:Sarabun,sans-serif;background:#F4F4F4;color:#2C1810;min-height:100vh}:root{--brown:#2C1810;--brown-mid:#4A1E0A;--gold:#C9951A;--gold-l:#E8B84B;--cream:#FAF3E8;--cream-d:#F0E6D3;--border:#E0CDB3;--muted:#7A5C3C;--green:#27AE60;--red:#E74C3C;--blue:#2980B9;--orange:#E67E22}button{cursor:pointer;border:none;font-family:inherit}input,select{font-family:inherit;outline:none}#login-screen{position:fixed;inset:0;background:var(--brown);display:flex;align-items:center;justify-content:center;z-index:9999}.login-card{background:#fff;border-radius:20px;padding:36px 28px;width:360px;max-width:95vw;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.4)}.login-logo{font-family:Playfair Display,serif;color:var(--gold);font-size:22px;letter-spacing:1px;margin-bottom:4px}.login-sub{font-size:12px;color:var(--muted);letter-spacing:2px;margin-bottom:24px}.login-card input{width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;background:var(--cream);margin-bottom:12px}.btn-login{width:100%;padding:14px;background:var(--gold);color:var(--brown);font-weight:700;font-size:15px;border-radius:10px;margin-top:4px;cursor:pointer}.btn-login:hover{background:var(--gold-l)}.login-error{color:var(--red);font-size:13px;margin-top:8px;display:none}.login-error.show{display:block}#app{display:none}#app.visible{display:block}.topbar{background:var(--brown);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}.topbar-logo{font-family:Playfair Display,serif;color:var(--gold);font-size:18px}.topbar-right{display:flex;gap:10px}.tn{padding:7px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer}.tn-r{background:rgba(201,149,26,.15);color:var(--gold)}.tn-l{background:none;color:#7A5C3C}.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;padding:16px}.stat-card{background:#fff;border-radius:12px;padding:14px 10px;text-align:center;border:1px solid var(--border)}.stat-val{font-size:22px;font-weight:700;color:var(--brown)}.stat-label{font-size:11px;color:var(--muted);margin-top:3px}.stat-card.gold .stat-val{color:var(--gold)}.filter-bar{padding:0 16px 12px;display:flex;gap:8px;overflow-x:auto;scrollbar-width:none}.filter-btn{padding:7px 16px;border-radius:20px;font-size:13px;font-weight:600;background:#fff;color:var(--muted);border:1.5px solid var(--border);white-space:nowrap;cursor:pointer}.filter-btn.active{background:var(--brown);color:var(--gold);border-color:var(--brown)}.orders-wrap{padding:0 12px 40px;display:flex;flex-direction:column;gap:12px}.order-card{background:#fff;border-radius:14px;overflow:hidden;border:1px solid var(--border)}.order-head{padding:12px 16px;background:var(--cream-d);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;border-bottom:1px solid var(--border)}.order-num{font-weight:700;font-size:15px;color:var(--brown)}.order-date{font-size:12px;color:var(--muted)}.order-body{padding:14px 16px;display:flex;flex-direction:column;gap:8px}.order-name{font-weight:600;font-size:15px}.order-phone{font-size:13px;color:var(--muted)}.order-items{font-size:13px;color:#444;background:var(--cream-d);border-radius:8px;padding:8px 12px}.order-total{font-size:17px;font-weight:700;color:var(--brown-mid)}.order-foot{padding:10px 16px;background:#FAFAFA;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}.order-addr{font-size:12px;color:var(--muted);line-height:1.5;flex:1}.badge{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700}.b-pending{background:#FFF3CD;color:#856404}.b-confirmed{background:#D1ECF1;color:#0C5460}.b-shipped{background:#CCE5FF;color:#004085}.b-delivered{background:#D4EDDA;color:#155724}.b-cancelled{background:#F8D7DA;color:#721C24}.status-sel{padding:7px 12px;border-radius:20px;font-size:12px;font-weight:700;border:1.5px solid var(--border);background:#fff;cursor:pointer}.pay-pp{background:#E8F4FD;color:#1565C0;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:700}.pay-cod{background:#FEF9E7;color:#B7770D;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:700}.slip-btn{background:var(--blue);color:#fff;padding:5px 10px;border-radius:8px;font-size:12px;font-weight:600;text-decoration:none}.note{font-size:12px;color:var(--muted);background:#FFFBE6;padding:6px 10px;border-radius:6px}.empty{text-align:center;padding:60px 20px;color:var(--muted)}.spinner{width:32px;height:32px;border:3px solid rgba(201,149,26,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:20px auto}@keyframes spin{to{transform:rotate(360deg)}}.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--brown);color:#fff;padding:10px 22px;border-radius:25px;font-size:13px;opacity:0;transition:opacity .3s;z-index:9999;pointer-events:none}.toast.show{opacity:1}.toast.ok{background:var(--green)}.toast.err{background:var(--red)}@media(min-width:600px){.stats-row{grid-template-columns:repeat(6,1fr)}}</style></head><body><div class="toast" id="toast"></div><div id="login-screen"><div class="login-card"><div class="login-logo">Golden Flying Tiger</div><div class="login-sub">ADMIN PANEL</div><input type="password" id="pw" placeholder="Admin password" onkeydown="if(event.key==='Enter')doLogin()"><button class="btn-login" onclick="doLogin()">Login</button><div class="login-error" id="login-err">Incorrect password. Please try again.</div></div></div><div id="app"><div class="topbar"><div class="topbar-logo">Golden Flying Tiger <span style="font-size:11px;color:#9C7B5C">ADMIN</span></div><div class="topbar-right"><button class="tn tn-r" onclick="loadOrders()">Refresh</button><button class="tn tn-r" onclick="showTabSettings()" id="btn-tab-settings" style="background:#7c5c3a;color:#fff;border:none;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:0.85rem;margin-left:6px">&#9881; Settings</button><button class="tn tn-l" onclick="logout()">Logout</button></div></div><div class="stats-row"><div class="stat-card"><div class="stat-val" id="s-total">0</div><div class="stat-label">Total</div></div><div class="stat-card"><div class="stat-val" id="s-pending" style="color:var(--orange)">0</div><div class="stat-label">Pending</div></div><div class="stat-card"><div class="stat-val" id="s-confirmed" style="color:var(--blue)">0</div><div class="stat-label">Confirmed</div></div><div class="stat-card"><div class="stat-val" id="s-shipped" style="color:#8E44AD">0</div><div class="stat-label">Shipped</div></div><div class="stat-card"><div class="stat-val" id="s-delivered" style="color:var(--green)">0</div><div class="stat-label">Delivered</div></div><div class="stat-card gold"><div class="stat-val" id="s-rev">0</div><div class="stat-label">Revenue (THB)</div></div></div><div class="filter-bar"><button class="filter-btn active" onclick="setFilter('all',this)">All</button><button class="filter-btn" onclick="setFilter('pending',this)">Pending</button><button class="filter-btn" onclick="setFilter('confirmed',this)">Confirmed</button><button class="filter-btn" onclick="setFilter('shipped',this)">Shipped</button><button class="filter-btn" onclick="setFilter('delivered',this)">Delivered</button><button class="filter-btn" onclick="setFilter('cancelled',this)">Cancelled</button></div><div class="orders-wrap" id="orders-wrap"><div class="spinner"></div></div><div id="settings-panel" style="display:none;padding:24px 0"><button onclick="hideTabSettings()" style="background:none;border:none;color:#7c5c3a;cursor:pointer;font-size:0.9rem;margin-bottom:16px;padding:0">&larr; Back to Orders</button><h3 style="margin:0 0 20px;font-size:1.1rem;color:#2d1a00;font-weight:700">&#9881; Shop Settings</h3><div style="display:grid;gap:12px;max-width:480px"><div><label style="display:block;font-size:0.8rem;color:#7c5c3a;margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px">PromptPay Number</label><input id="s-promptpay" type="text" placeholder="0XX-XXX-XXXX" style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:6px;font-size:0.95rem;box-sizing:border-box"></div><div><label style="display:block;font-size:0.8rem;color:#7c5c3a;margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px">Account Name</label><input id="s-acc-name" type="text" placeholder="First Last" style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:6px;font-size:0.95rem;box-sizing:border-box"></div><div><label style="display:block;font-size:0.8rem;color:#7c5c3a;margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px">Bank Name</label><input id="s-bank-name" type="text" placeholder="e.g. Kasikorn Bank" style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:6px;font-size:0.95rem;box-sizing:border-box"></div><div><label style="display:block;font-size:0.8rem;color:#7c5c3a;margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px">Account Number</label><input id="s-acc-num" type="text" placeholder="XXX-X-XXXXX-X" style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:6px;font-size:0.95rem;box-sizing:border-box"></div><div><label style="display:block;font-size:0.8rem;color:#7c5c3a;margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:.5px">LINE ID</label><input id="s-line" type="text" placeholder="@yourlineid" style="width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:6px;font-size:0.95rem;box-sizing:border-box"></div></div><div style="margin-top:20px;display:flex;align-items:center;gap:14px"><button onclick="saveSettings()" style="background:#2d1a00;color:#fff;padding:10px 28px;border:none;border-radius:6px;cursor:pointer;font-size:0.95rem;font-weight:600">Save Settings</button><span id="settings-msg" style="font-size:0.9rem"></span></div><p style="margin-top:16px;font-size:0.8rem;color:#999">Changes go live on the storefront after the next page load.</p></div></div><script>var AU="https://yufalisxhyhcuejmbpsa.supabase.co/functions/v1/admin-orders";var AK="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl1ZmFsaXN4aHloY3Vlam1icHNhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5NzQ5NDksImV4cCI6MjA5ODU1MDk0OX0.c0Gqgs8WUtZMyA8bO8wlH_y9G-yP5uvrr8wxPt9Kdxw";var pw="",orders=[],filt="all";function doLogin(){  var p=document.getElementById("pw").value.trim();  if(!p)return;  pw=p;  document.getElementById("login-err").classList.remove("show");  loadOrders();}function api(a,e){  var b=Object.assign({password:pw,action:a},e||{});  return fetch(AU,{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+AK},body:JSON.stringify(b)})  .then(function(r){return r.json().then(function(j){if(!r.ok)throw new Error(j.error||"Error");return j;});});}function logout(){pw="";document.getElementById("app").classList.remove("visible");document.getElementById("login-screen").style.display="flex";document.getElementById("pw").value="";}function loadOrders(){  document.getElementById("orders-wrap").innerHTML="<div class='spinner'></div>";  api("list_orders").then(function(d){    document.getElementById("login-screen").style.display="none";    document.getElementById("app").classList.add("visible");    orders=d.orders||[];    calcStats();    renderOrders();  }).catch(function(e){    if(e.message&&(e.message.indexOf("nauthorized")>=0||e.message.indexOf("password")>=0)){      document.getElementById("login-screen").style.display="flex";      document.getElementById("app").classList.remove("visible");      document.getElementById("login-err").classList.add("show");    }else{showToast("Error: "+e.message,"err");}  });}function calcStats(){  var o=orders;  document.getElementById("s-total").textContent=o.length;  ["pending","confirmed","shipped","delivered"].forEach(function(s){    document.getElementById("s-"+s).textContent=o.filter(function(x){return x.status===s;}).length;  });  var rev=o.filter(function(x){return["confirmed","shipped","delivered"].indexOf(x.status)>=0;}).reduce(function(s,x){return s+parseFloat(x.total_amount||0);},0);  document.getElementById("s-rev").textContent=Number(rev).toLocaleString();}function setFilter(f,b){filt=f;document.querySelectorAll(".filter-btn").forEach(function(x){x.classList.remove("active");});b.classList.add("active");renderOrders();}function renderOrders(){  var list=filt==="all"?orders:orders.filter(function(o){return o.status===filt;});  var c=document.getElementById("orders-wrap");  if(!list.length){c.innerHTML="<div class='empty'>No orders</div>";return;}  var h="";  list.forEach(function(o){    var it=(Array.isArray(o.items)?o.items:[]).map(function(i){return(i.name_roman||i.name||"")+" x "+i.qty;}).join(", ");    var dt=new Date(o.created_at);    var ds=dt.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"2-digit"})+" "+dt.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});    var badgeClass={pending:"b-pending",confirmed:"b-confirmed",shipped:"b-shipped",delivered:"b-delivered",cancelled:"b-cancelled"}[o.status]||"b-pending";    var sb="<span class='badge "+badgeClass+"'>"+o.status.charAt(0).toUpperCase()+o.status.slice(1)+"</span>";    var pay=o.payment_method==="promptpay"?"<span class='pay-pp'>PromptPay</span>":"<span class='pay-cod'>COD</span>";    var slip=o.payment_slip_url?"<a class='slip-btn' href='"+o.payment_slip_url+"' target='_blank'>Slip</a>":"";    var addr=[o.address_detail,o.subdistrict,o.district,o.province,o.postal_code].filter(Boolean).join(", ");    var note=o.notes?"<div class='note'>"+o.notes+"</div>":"";    var sopts=["pending","confirmed","shipped","delivered","cancelled"].map(function(s){      var sel=o.status===s?" selected":"";      var label=s.charAt(0).toUpperCase()+s.slice(1);      return"<option value='"+s+"'"+sel+">"+label+"</option>";    }).join("");    h+="<div class='order-card'>";    h+="<div class='order-head'>";    h+="<div><div class='order-num'>"+(o.order_number||"-")+"</div><div class='order-date'>"+ds+"</div></div>";    h+="<div style='display:flex;gap:6px'>"+pay+sb+"</div>";    h+="</div>";    h+="<div class='order-body'>";    h+="<div class='order-name'>"+o.customer_name+"</div>";    h+="<div class='order-phone'>"+o.customer_phone+"</div>";    h+="<div class='order-items'>"+(it||"No items")+"</div>";    h+="<div style='display:flex;align-items:center;justify-content:space-between'>";    h+="<div class='order-total'>"+Number(o.total_amount).toLocaleString()+" THB</div>"+slip;    h+="</div>"+note+"</div>";    h+="<div class='order-foot'><div class='order-addr'>"+addr+"</div>";    h+="<select class='status-sel' data-oid='"+o.id+"'>"+sopts+"</select>";    h+="</div></div>";  });  c.innerHTML=h;  c.querySelectorAll(".status-sel").forEach(function(sel){    sel.addEventListener("change",function(){upd(this.getAttribute("data-oid"),this.value);});  });}function upd(id,s){  api("update_status",{orderId:id,status:s}).then(function(){    var o=orders.find(function(x){return x.id===id;});    if(o)o.status=s;    calcStats();    showToast("Updated","ok");  }).catch(function(e){showToast("Failed: "+e.message,"err");loadOrders();});}function showToast(m,t){var el=document.getElementById("toast");el.textContent=m;el.className="toast show "+(t||"");setTimeout(function(){el.className="toast";},3000);}setInterval(function(){if(pw)loadOrders();},60000);
function showTabSettings(){
  document.getElementById('orders-wrap').style.display='none';
  document.querySelector('.filter-bar').style.display='none';
  document.getElementById('settings-panel').style.display='block';
  document.getElementById('btn-tab-settings').style.background='#2d1a00';
  loadSettingsAdmin();
}
function hideTabSettings(){
  document.getElementById('orders-wrap').style.display='';
  document.querySelector('.filter-bar').style.display='';
  document.getElementById('settings-panel').style.display='none';
  document.getElementById('btn-tab-settings').style.background='#7c5c3a';
}
async function loadSettingsAdmin(){
  var msg=document.getElementById('settings-msg');
  msg.style.color='#666'; msg.textContent='Loading...';
  try{
    var res=await fetch(AU,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+AK},body:JSON.stringify({password:pw,action:'get_settings'})});
    var j=await res.json();
    if(j.settings){
      var s=j.settings;
      document.getElementById('s-promptpay').value=s.promptpay_number||'';
      document.getElementById('s-acc-name').value=s.account_name||'';
      document.getElementById('s-bank-name').value=s.bank_name||'';
      document.getElementById('s-acc-num').value=s.account_number||'';
      document.getElementById('s-line').value=s.shop_line||'';
      msg.textContent='';
    } else { msg.style.color='red'; msg.textContent='Failed to load'; }
  }catch(e){ msg.style.color='red'; msg.textContent='Error: '+e.message; }
}
async function saveSettings(){
  var msg=document.getElementById('settings-msg');
  msg.style.color='#666'; msg.textContent='Saving...';
  try{
    var settings={
      promptpay_number:document.getElementById('s-promptpay').value.trim(),
      account_name:document.getElementById('s-acc-name').value.trim(),
      bank_name:document.getElementById('s-bank-name').value.trim(),
      account_number:document.getElementById('s-acc-num').value.trim(),
      shop_line:document.getElementById('s-line').value.trim()
    };
    var res=await fetch(AU,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+AK},body:JSON.stringify({password:pw,action:'update_settings',settings})});
    var j=await res.json();
    if(j.settings){
      msg.style.color='green'; msg.textContent='Saved ✓';
      setTimeout(function(){msg.textContent='';},4000);
    } else { msg.style.color='red'; msg.textContent='Error: '+(j.error||'unknown'); }
  }catch(e){ msg.style.color='red'; msg.textContent='Error: '+e.message; }
}</script></body></html>
