name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 8 */5 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://yufalisxhyhcuejmbpsa.supabase.co/auth/v1/health)
          echo "Ping status: $STATUS"
          [ "$STATUS" = "200" ] && echo "Supabase OK" || echo "Warn: $STATUS"
